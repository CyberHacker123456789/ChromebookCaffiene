<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CAFFEINE_v5.3</title>
    <style>
        :root { --main-green: #00ff41; --bg-black: #0d0d0d; }
        body {
            background-color: var(--bg-black);
            color: var(--main-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        #main-ui { text-align: center; border: 1px solid var(--main-green); padding: 30px; box-shadow: 0 0 15px var(--main-green); }
        .btn {
            background: transparent; color: var(--main-green); border: 1px solid var(--main-green);
            padding: 12px 20px; font-size: 0.9rem; cursor: pointer; margin: 10px;
        }
        .btn:hover { background: var(--main-green); color: var(--bg-black); }
        #log {
            margin-top: 15px; font-size: 0.7rem; height: 100px; overflow-y: auto;
            text-align: left; border-top: 1px solid var(--main-green); padding-top: 10px;
        }
        #caffeineVid { width: 1px; height: 1px; position: absolute; bottom: 0; opacity: 0.01; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h3>CAFFEINE_SYSTEM_v5.3</h3>
        <p>CORE: <span id="status" style="color: orange;">IDLE</span></p>
        <p>UPTIME: <span id="timer">00:00:00</span></p>
        
        <button class="btn" id="startBtn">START CORE</button>
        <button class="btn" id="pipBtn">FLOATING MODE</button>
        
        <video id="caffeineVid" loop playsinline muted></video>
        <div id="log"></div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const pipBtn = document.getElementById('pipBtn');
        const vid = document.getElementById('caffeineVid');
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');

        let wakeLock = null;
        let startTime = null;
        let timerInterval = null;

        // Force a canvas stream (this tricks the browser into thinking a real movie is playing)
        function getHeartbeatStream() {
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            setInterval(() => {
                ctx.fillStyle = 'black';
                ctx.fillRect(0,0,100,100);
                ctx.fillStyle = '#00ff41';
                ctx.fillText(Math.random(), 10, 50); // Moving text makes it a "live" video
            }, 500);
            return canvas.captureStream(10); // 10 FPS
        }

        async function start() {
            addLog("Attempting Startup...");
            
            // 1. Reset UI Immediately
            startTime = Date.now();
            statusEl.innerText = "ACTIVE";
            statusEl.style.color = "var(--main-green)";
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            // 2. Start Video (Heartbeat)
            try {
                vid.srcObject = getHeartbeatStream();
                await vid.play();
                addLog("Heartbeat: ONLINE");
            } catch (e) {
                addLog("Heartbeat: FAILED");
            }

            // 3. Request WakeLock
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    addLog("WakeLock: GRANTED");
                } catch (e) {
                    addLog("WakeLock: DENIED (Admin Block)");
                }
            } else {
                addLog("WakeLock: NOT SUPPORTED");
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            timerEl.innerText = `${h}:${m}:${s}`;
        }

        async function enterPiP() {
            try {
                if (vid.srcObject) {
                    await vid.requestPictureInPicture();
                    addLog("PIP: ACTIVE");
                } else {
                    addLog("PIP: Error (Start Core first)");
                }
            } catch (e) {
                addLog("PIP: System Blocked.");
            }
        }

        function addLog(msg) {
            const d = document.createElement('div');
            d.innerText = `> ${msg}`;
            logEl.prepend(d);
        }

        startBtn.onclick = start;
        pipBtn.onclick = enterPiP;
    </script>
</body>
</html>
