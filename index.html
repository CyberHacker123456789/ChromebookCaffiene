<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CAFFEINE_v5.2</title>
    <style>
        :root { --main-green: #00ff41; --bg-black: #0d0d0d; }
        body {
            background-color: var(--bg-black);
            color: var(--main-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #loader { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 255, 65, 0.1);
            border-top: 3px solid var(--main-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #main-ui { display: none; text-align: center; border: 1px solid var(--main-green); padding: 30px; box-shadow: 0 0 15px var(--main-green); }
        .btn {
            background: transparent; color: var(--main-green); border: 1px solid var(--main-green);
            padding: 12px 20px; font-size: 0.9rem; cursor: pointer; margin: 10px;
        }
        .btn:hover { background: var(--main-green); color: var(--bg-black); }
        
        #log {
            margin-top: 15px; font-size: 0.7rem; height: 80px; overflow-y: auto;
            text-align: left; border-top: 1px solid var(--main-green); padding-top: 10px;
        }

        /* We make the video tiny but technically 'visible' so PiP works */
        #caffeineVid { width: 10px; height: 10px; position: absolute; bottom: 0; opacity: 0.1; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="load-msg">CONNECTING...</div>
    </div>

    <div id="main-ui">
        <h3>CAFFEINE_OS_v5.2</h3>
        <p>CORE_STATUS: <span id="status">IDLE</span></p>
        <p>UPTIME: <span id="timer">00:00:00</span></p>
        
        <button class="btn" id="startBtn">START CORE</button>
        <button class="btn" id="pipBtn">ENABLE FLOATING</button>
        
        <video id="caffeineVid" loop playsinline muted></video>
        <div id="log"></div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const pipBtn = document.getElementById('pipBtn');
        const vid = document.getElementById('caffeineVid');
        const logEl = document.getElementById('log');

        let wakeLock = null;
        let startTime = null;

        // --- 1. BOOT SEQUENCE ---
        setTimeout(() => { document.getElementById('load-msg').innerText = "BYPASSING POLICIES..."; }, 1000);
        setTimeout(() => { document.getElementById('load-msg').innerText = "GENERATING HEARTBEAT..."; }, 2000);
        setTimeout(() => { 
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }, 3000);

        // --- 2. THE VIDEO GENERATOR ---
        // This creates a fake video stream so PiP has something to 'watch'
        function createStream() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            setInterval(() => {
                ctx.fillStyle = '#' + Math.floor(Math.random()*16777215).toString(16);
                ctx.fillRect(0, 0, 64, 64);
            }, 100);
            return canvas.captureStream();
        }

        // --- 3. LOGIC ---
        startBtn.addEventListener('click', async () => {
            addLog("Initializing...");

            // Fix for the Timer: Set startTime immediately
            startTime = Date.now();
            
            // WakeLock
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    addLog("WakeLock: OK");
                } catch (e) {
                    addLog("WakeLock: BLOCKED");
                }
            }

            // Video Stream
            vid.srcObject = createStream();
            await vid.play();
            addLog("Heartbeat: OK");

            document.getElementById('status').innerText = "ACTIVE";
            document.getElementById('status').style.color = "#00ff41";
            
            // Start Timer Loop
            setInterval(updateTimer, 1000);
        });

        pipBtn.addEventListener('click', async () => {
            if (!vid.srcObject) {
                addLog("Error: Start Core first!");
                return;
            }
            try {
                // We must interact with the video element directly for some Chrome versions
                await vid.requestPictureInPicture();
                addLog("Floating: ENABLED");
            } catch (e) {
                addLog("PiP: System Denied.");
                console.log(e);
            }
        });

        function updateTimer() {
            if (!startTime) return;
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }

        function addLog(msg) {
            const d = document.createElement('div');
            d.innerText = `> ${msg}`;
            logEl.prepend(d);
        }
    </script>
</body>
</html>
