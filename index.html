<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_CAFFEINE_v5.0</title>
    <style>
        :root { --main-green: #00ff41; --bg-black: #0d0d0d; }
        body {
            background-color: var(--bg-black);
            color: var(--main-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top: 3px solid var(--main-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MAIN UI --- */
        #main-ui {
            display: none;
            text-align: center;
            border: 1px solid var(--main-green);
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            max-width: 500px;
        }

        .btn {
            background: transparent;
            color: var(--main-green);
            border: 1px solid var(--main-green);
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--main-green); color: var(--bg-black); box-shadow: 0 0 10px var(--main-green); }

        #log {
            margin-top: 20px;
            font-size: 0.75rem;
            height: 100px;
            overflow-y: auto;
            text-align: left;
            border-top: 1px solid var(--main-green);
            padding: 10px;
            opacity: 0.8;
        }
        .status-active { color: var(--main-green); font-weight: bold; text-shadow: 0 0 8px var(--main-green); }
        video { width: 1px; height: 1px; opacity: 0.01; position: absolute; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="load-text">BOOTING SYSTEM...</div>
    </div>

    <div id="main-ui">
        <h2 style="letter-spacing: 3px;">CORE_STAY_AWAKE</h2>
        <hr style="border: 0.5px solid var(--main-green);">
        <p>STATUS: <span id="status">OFFLINE</span></p>
        <p>RUNTIME: <span id="timer">00:00:00</span></p>
        
        <button class="btn" id="startBtn">Initialize Core</button>
        <button class="btn" id="pipBtn" style="display:none;">Enable Floating Mode</button>
        
        <video id="caffeineVid" loop playsinline muted></video>
        
        <div id="log"></div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const loadText = document.getElementById('load-text');
        const mainUI = document.getElementById('main-ui');
        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');
        const logEl = document.getElementById('log');
        const startBtn = document.getElementById('startBtn');
        const pipBtn = document.getElementById('pipBtn');
        const vid = document.getElementById('caffeineVid');

        let wakeLock = null;
        let startTime;
        let timerInterval;

        // --- 1. THE COOL LOADING SEQUENCE ---
        const bootSteps = [
            "DECRYPTING CORE...",
            "BYPASSING SLEEP_TIMER...",
            "ESTABLISHING WAKE_LOCK...",
            "SYSTEM READY."
        ];

        let step = 0;
        const loadInterval = setInterval(() => {
            if (step < bootSteps.length) {
                loadText.innerText = bootSteps[step];
                step++;
            } else {
                clearInterval(loadInterval);
                loader.style.display = 'none';
                mainUI.style.display = 'block';
            }
        }, 800);

        // --- 2. THE CAFFEINE LOGIC ---
        const videoSrc = "data:video/mp4;base64,AAAAHGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAAZhtZGF0AAAByW1vb3YAAABsbXZoZAAAAADbe6S823ukvAAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABidHJhawAAAFx0a2hkAAAAAdt7pLzbe6S8AAAAAQAAAAAAA+gAAAAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAIXbWRpYQAAACBtZGhkAAAAAdt7pLzbe6S8AAAA6AAAA+gUAAAAAAAhYmxlbgAAAAAAbWluZgAAABRoZGxyAAAAAAAAAAB2aWRlAAAAAAAAAAAAAAAVZGluZgAAABxkcmVmAAAAAAAAAAEAAAAMdXJsIAAAAAEAAAEQc3RibAAAALhzdHNkAAAAAAAAAAEAAACWYXZjMQAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAD6APoAAAAAABIAAAAASAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAGP//AAAALWF2Y0MBQsAs/+EAFWfEACz7AQZAgIACAo6CkoCigKKAoAAAHAAB4XAXi4AAAAAoc3R0cwAAAAAAAAABAAAAAQAA6AAAAAAAc3RzYwAAAAAAAAABAAAAAQAAAAEAAAABAAAAFHN0c3oAAAAAAAAAAAAAAAEAAAAUc3RjbwAAAAAAAAABAAAALAAAAGd1ZHRhAAAAX21ldGEAAAAAAAAAIWhkbHIAAAAAAAAAAG1klyAAAAAAAAAAAAAAAAAAAAAALWlsc3QAAAAlqXRvbwAAAB1kYXRhAAAAAQAAAABMYXZmNTguMjkuMTAw";

        async function activateCaffeine() {
            addLog("Requesting WakeLock...");
            
            // Try Official API
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    addLog("API: Success.");
                }
            } catch (err) {
                addLog("API: Blocked by Policy.");
            }

            // Start Video Heartbeat
            vid.src = videoSrc;
            await vid.play();
            addLog("VIDEO: Heartbeat active.");
            
            // Show PiP Button
            pipBtn.style.display = "inline-block";
            
            // Update UI
            statusEl.innerText = "ONLINE";
            statusEl.className = "status-active";
            startBtn.innerText = "Terminate";
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        // Floating Window (Picture-in-Picture)
        pipBtn.addEventListener('click', async () => {
            try {
                await vid.requestPictureInPicture();
                addLog("PIP: Floating window active.");
            } catch (e) {
                addLog("PIP: Failed. (Needs User Interaction)");
            }
        });

        function updateTimer() {
            const diff = Date.now() - startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
            const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            timerEl.innerText = `${h}:${m}:${s}`;
        }

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logEl.prepend(div);
        }

        startBtn.addEventListener('click', () => {
            if (statusEl.innerText === "OFFLINE") activateCaffeine();
            else location.reload(); // Quick reset
        });
    </script>
</body>
</html>
