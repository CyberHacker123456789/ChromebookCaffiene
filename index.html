<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CAFFEINE_v5.1</title>
    <style>
        :root { --main-green: #00ff41; --bg-black: #0d0d0d; }
        body {
            background-color: var(--bg-black);
            color: var(--main-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- FORCED LOADING SCREEN --- */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 999;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 255, 65, 0.1);
            border-top: 4px solid var(--main-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MAIN UI --- */
        #main-ui {
            display: none; /* Hidden until boot finishes */
            text-align: center;
            border: 1px solid var(--main-green);
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .btn {
            background: transparent;
            color: var(--main-green);
            border: 1px solid var(--main-green);
            padding: 15px 25px;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--main-green); color: var(--bg-black); }

        #log {
            margin-top: 20px;
            font-size: 0.8rem;
            height: 120px;
            overflow-y: auto;
            text-align: left;
            border-top: 1px solid var(--main-green);
            padding-top: 10px;
        }
        
        /* Ensure the video is "technically" visible but hidden from the user */
        #caffeineVid {
            width: 160px;
            height: 90px;
            position: absolute;
            bottom: 0;
            right: 0;
            opacity: 0.001; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 id="load-text">INITIALIZING...</h2>
    </div>

    <div id="main-ui">
        <h2>CAFFEINE_PROTOCOL_V5</h2>
        <p>STATUS: <span id="status">IDLE</span></p>
        <p>UPTIME: <span id="timer">00:00:00</span></p>
        
        <button class="btn" id="startBtn">START CORE</button>
        <button class="btn" id="pipBtn">ENABLE FLOATING</button>
        
        <video id="caffeineVid" loop playsinline muted></video>
        
        <div id="log"></div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const loadText = document.getElementById('load-text');
        const mainUI = document.getElementById('main-ui');
        const startBtn = document.getElementById('startBtn');
        const pipBtn = document.getElementById('pipBtn');
        const vid = document.getElementById('caffeineVid');
        const logEl = document.getElementById('log');

        let wakeLock = null;
        let startTime;

        // 1. FORCED BOOT SEQUENCE (Will definitely show up now)
        const bootMessages = [
            "CONNECTING TO KERNEL...",
            "DEFEATING AUTO-LOCK...",
            "BYPASSING CHROME_POLICY...",
            "HANDSHAKE COMPLETE."
        ];
        
        let i = 0;
        const bootSequence = setInterval(() => {
            if (i < bootMessages.length) {
                loadText.innerText = bootMessages[i];
                i++;
            } else {
                clearInterval(bootSequence);
                loader.style.display = "none";
                mainUI.style.display = "block";
                addLog("System ready for deployment.");
            }
        }, 1000); // 1 second per message

        // 2. WAKE LOGIC
        const videoData = "data:video/mp4;base64,AAAAHGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAAZhtZGF0AAAByW1vb3YAAABsbXZoZAAAAADbe6S823ukvAAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABidHJhawAAAFx0a2hkAAAAAdt7pLzbe6S8AAAAAQAAAAAAA+gAAAAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAIXbWRpYQAAACBtZGhkAAAAAdt7pLzbe6S8AAAA6AAAA+gUAAAAAAAhYmxlbgAAAAAAbWluZgAAABRoZGxyAAAAAAAAAAB2aWRlAAAAAAAAAAAAAAAVZGluZgAAABxkcmVmAAAAAAAAAAEAAAAMdXJsIAAAAAEAAAEQc3RibAAAALhzdHNkAAAAAAAAAAEAAACWYXZjMQAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAD6APoAAAAAABIAAAAASAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAGP//AAAALWF2Y0MBQsAs/+EAFWfEACz7AQZAgIACAo6CkoCigKKAoAAAHAAB4XAXi4AAAAAoc3R0cwAAAAAAAAABAAAAAQAA6AAAAAAAc3RzYwAAAAAAAAABAAAAAQAAAAEAAAABAAAAFHN0c3oAAAAAAAAAAAAAAAEAAAAUc3RjbwAAAAAAAAABAAAALAAAAGd1ZHRhAAAAX21ldGEAAAAAAAAAIWhkbHIAAAAAAAAAAG1klyAAAAAAAAAAAAAAAAAAAAAALWlsc3QAAAAlqXRvbwAAAB1kYXRhAAAAAQAAAABMYXZmNTguMjkuMTAw";

        startBtn.onclick = async () => {
            addLog("Core initialization triggered...");
            
            // Acquire WakeLock API
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    addLog("WakeLock: ACTIVE");
                } catch (e) {
                    addLog("WakeLock: BLOCKED by Admin.");
                }
            }

            // Start Video
            vid.src = videoData;
            await vid.play();
            addLog("Heartbeat: ACTIVE");

            document.getElementById('status').innerText = "RUNNING";
            startTime = Date.now();
            setInterval(updateTimer, 1000);
        };

        // 3. PICTURE-IN-PICTURE (The "Keep Background Awake" trick)
        pipBtn.onclick = async () => {
            if (!vid.src) {
                addLog("Error: Initialize Core first!");
                return;
            }
            try {
                // Some Chromebooks require the video to be "visible" to enter PiP
                vid.style.opacity = "1"; 
                await vid.requestPictureInPicture();
                vid.style.opacity = "0.001";
                addLog("Floating Window: ENABLED");
            } catch (e) {
                addLog("PiP Error: Check permissions.");
                console.error(e);
            }
        };

        function updateTimer() {
            const now = Date.now();
            const diff = new Date(now - startTime);
            const h = String(diff.getUTCHours()).padStart(2, '0');
            const m = String(diff.getUTCMinutes()).padStart(2, '0');
            const s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }

        function addLog(text) {
            const entry = document.createElement('div');
            entry.innerText = `> ${text}`;
            logEl.prepend(entry);
        }
    </script>
</body>
</html>
